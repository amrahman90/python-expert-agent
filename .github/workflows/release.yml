name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.0.2)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Update version in package.json
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version change
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add package.json
          git commit -m "release: v${{ inputs.version }}"

      - name: Create git tag
        run: git tag v${{ inputs.version }}

      - name: Push changes
        run: git push origin HEAD --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create v${{ inputs.version }} \
            --title "v${{ inputs.version }}" \
            --notes "Release v${{ inputs.version }} of Python Expert Agent for OpenCode.

          ## Installation

          \`\`\`bash
          npm install -g python-expert-agent
          python-expert-agent init
          \`\`\`

          ## What's Included

          - 1 primary agent (python-expert)
          - 4 subagents (coder, reviewer, tester, scout)
          - 10 skills (fastapi, backend, testing, asyncio, etc.)
          - 3 context files (standards, patterns, security)

          See [CHANGELOG.md](./CHANGELOG.md) for details."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
